# Pre-commit hooks for lua-jsonata.
# Install once:  pre-commit install && pre-commit install --hook-type pre-push
# Run on all files:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^spec/jsonata-suite/
      - id: end-of-file-fixer
        exclude: ^spec/jsonata-suite/
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^spec/jsonata-suite/

  - repo: local
    hooks:
      # Formatting check via the project's stylua config (.stylua.toml).
      - id: stylua
        name: stylua (check formatting)
        entry: stylua --check
        language: system
        files: '\.lua$'

      # Full test suite, run before push (not on every commit).
      # Wrapped so busted resolves from the user-local LuaRocks tree.
      - id: busted
        name: busted (test suite)
        entry: bash -c 'eval "$(luarocks path --local)"; exec busted'
        language: system
        pass_filenames: false
        stages: [pre-push]
